<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema CETAC 12 Pro</title>

<style>
body {
    margin:0;
    font-family:'Segoe UI', Arial;
    background:#b3e5fc;
    overflow:hidden;
    transition: background 0.3s, color 0.3s;
}

/* 🌙 MODO OSCURO */
body.dark {
    background:#0f172a;
    color:white;
}

/* 🌧️ LLUVIA */
#emojiRain {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:0;
}

.emoji {
    position:absolute;
    font-size:26px;
    animation: fall linear forwards;
    opacity:0.35;
}

@keyframes fall {
    0% {transform: translateY(-50px);}
    100% {transform: translateY(110vh);}
}

/* LOGIN */
#login {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#003366,#0055aa);
    position:relative;
    z-index:2;
}

.login-box {
    background:white;
    padding:35px;
    border-radius:12px;
    width:300px;
    text-align:center;
}

/* INPUTS */
input {
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

/* BOTONES */
button {
    width:100%;
    padding:10px;
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* SIDEBAR */
.sidebar {
    width:230px;
    height:100vh;
    position:fixed;
    background:#0f172a;
    color:white;
    padding-top:20px;
}

.sidebar h2 {
    text-align:center;
}

/* MAIN */
.main {
    margin-left:230px;
    padding:25px;
    height:100vh;
    overflow-y:auto;
}

/* CARDS */
.card {
    background:#000;
    color:white;
    padding:20px;
    margin:15px 0;
    border-radius:12px;
    border:2px solid #38bdf8;
}

/* SECCIONES */
.seccion { display:none; }
.seccion.activa { display:block; }

/* TABLAS */
table {
    width:100%;
    border-collapse:collapse;
    background:#000;
    color:white;
}

td,th {
    padding:10px;
    border-bottom:1px solid #333;
    text-align:center;
}

th {
    background:#1e293b;
}

#app { display:none; }
</style>
</head>

<body>

<div id="emojiRain"></div>

<!-- LOGIN -->
<div id="login">
    <div class="login-box">
        <h2>🏫 CETAC 12</h2>
        <input id="usuario" placeholder="Usuario">
        <input id="password" type="password" placeholder="Contraseña">
        <button onclick="entrar()">Ingresar</button>
    </div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
    <h2>🏫 CETAC 12</h2>
    <button onclick="mostrar('dashboard')">🏠 Inicio</button>
    <button onclick="mostrar('registro')">🎒 Registrar</button>
    <button onclick="mostrar('lista')">👩🏼‍🎓 Alumnos</button>
    <button onclick="mostrar('calificaciones')">📖 Calificaciones</button>
    <button onclick="toggleDark()">🌙 / ☀️ Modo</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="seccion activa">
    <div class="card">
        <h2>🏫 Panel Principal</h2>
    </div>
</div>

<!-- REGISTRO -->
<div id="registro" class="seccion">
    <div class="card">
        <h2>🎒 Registrar Alumno</h2>
        <input id="nombre" placeholder="Nombre">
        <input id="grupo" placeholder="Grupo">
        <button onclick="registrar()">Guardar</button>
    </div>
</div>

<!-- LISTA -->
<div id="lista" class="seccion">
    <div class="card">
        <h2>👩🏼‍🎓 Lista de Alumnos</h2>
        <table id="tablaAlumnos"></table>
    </div>
</div>

<!-- CALIFICACIONES (ARREGLADO) -->
<div id="calificaciones" class="seccion">
    <div class="card">
        <h2>📖 Calificaciones</h2>

        <input id="alumnoCal" placeholder="Nombre del alumno">
        <input id="calificacion" placeholder="Calificación">
        <button onclick="guardarCal()">Guardar calificación</button>

        <br><br>
        <table id="tablaCalificaciones"></table>
    </div>
</div>

</div>
</div>

<script>

/* LOGIN */
function entrar(){
    let u=document.getElementById("usuario").value;
    let p=document.getElementById("password").value;

    if(u==="angel" && p==="1234"){
        document.getElementById("login").style.display="none";
        document.getElementById("app").style.display="block";
        cargarAlumnos();
        cargarCalificaciones();
    } else {
        alert("Incorrecto");
    }
}

/* NAV */
function mostrar(sec){
    document.querySelectorAll(".seccion").forEach(s=>s.classList.remove("activa"));
    document.getElementById(sec).classList.add("activa");
}

/* DARK MODE */
function toggleDark(){
    document.body.classList.toggle("dark");
}

/* ALUMNOS */
function registrar(){
    let nombre=document.getElementById("nombre").value;
    let grupo=document.getElementById("grupo").value;

    let alumnos=JSON.parse(localStorage.getItem("alumnos"))||[];
    alumnos.push({nombre,grupo});

    localStorage.setItem("alumnos",JSON.stringify(alumnos));
    cargarAlumnos();
}

function cargarAlumnos(){
    let tabla=document.getElementById("tablaAlumnos");
    let alumnos=JSON.parse(localStorage.getItem("alumnos"))||[];

    tabla.innerHTML="<tr><th>Nombre</th><th>Grupo</th></tr>";

    alumnos.forEach(a=>{
        tabla.innerHTML+=`
        <tr>
            <td>${a.nombre}</td>
            <td>${a.grupo}</td>
        </tr>`;
    });
}

/* CALIFICACIONES */
function guardarCal(){
    let nombre=document.getElementById("alumnoCal").value;
    let cal=document.getElementById("calificacion").value;

    let datos=JSON.parse(localStorage.getItem("calificaciones"))||[];
    datos.push({nombre,cal});

    localStorage.setItem("calificaciones",JSON.stringify(datos));

    cargarCalificaciones();
}

function cargarCalificaciones(){
    let tabla=document.getElementById("tablaCalificaciones");
    let datos=JSON.parse(localStorage.getItem("calificaciones"))||[];

    tabla.innerHTML="<tr><th>Nombre</th><th>Calificación</th></tr>";

    datos.forEach(c=>{
        tabla.innerHTML+=`
        <tr>
            <td>${c.nombre}</td>
            <td>${c.cal}</td>
        </tr>`;
    });
}

/* LLUVIA */
setInterval(()=>{
    let emojis=["🫪","🤓","😴"];
    let e=document.createElement("div");
    e.classList.add("emoji");
    e.innerHTML=emojis[Math.floor(Math.random()*3)];
    e.style.left=Math.random()*100+"vw";
    e.style.animationDuration=(3+Math.random()*3)+"s";
    document.getElementById("emojiRain").appendChild(e);
    setTimeout(()=>e.remove(),6000);
},400);

</script>

</body>
</html>
